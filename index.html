<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon premier site</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        header {
            padding: 60px 20px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background: white;
            color: #00a8ff;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #f1f1f1;
            transform: scale(1.05);
        }

        footer {
            margin-top: 100px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<header>
    <h1>Bienvenue sur mon premier site ! 🚀</h1>
    <p>Ce site a été créé avec HTML et CSS.</p>

    <a href="#" class="btn">Découvrir</a>
</header>

<footer>
    © 2026 - Mon premier site
</footer>

</body>
</html>
